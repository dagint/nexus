<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Helper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #dee2e6;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      color: #75b798;
      margin-bottom: 12px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 12px;
      color: #adb5bd;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #495057;
      border-radius: 6px;
      background: #16213e;
      color: #dee2e6;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #75b798;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
      text-align: center;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #75b798;
      color: #1a1a2e;
      margin-top: 12px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #63a382;
    }

    .btn-secondary {
      background: transparent;
      color: #75b798;
      border: 1px solid #75b798;
      margin-top: 8px;
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(117, 183, 152, 0.1);
    }

    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    #status.success {
      display: block;
      background: rgba(117, 183, 152, 0.15);
      color: #75b798;
      border: 1px solid rgba(117, 183, 152, 0.3);
    }

    #status.error {
      display: block;
      background: rgba(220, 53, 69, 0.15);
      color: #e57373;
      border: 1px solid rgba(220, 53, 69, 0.3);
    }

    .server-section {
      margin-bottom: 12px;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a4a;
      margin: 14px 0;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #6c757d;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <h1>Nexus Helper</h1>

  <div class="server-section">
    <label for="serverUrl">Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://localhost:5000">
  </div>

  <button id="saveJob" class="btn btn-primary">Save Current Job</button>
  <button id="openDashboard" class="btn btn-secondary">Open Dashboard</button>

  <div id="status"></div>

  <hr class="divider">
  <div class="footer">Supported: LinkedIn, Indeed, Glassdoor, Greenhouse, Lever</div>

  <script src="popup.js"></script>
</body>
</html>
