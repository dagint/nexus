{% extends "base.html" %}

{% block title %}Register - Nexus{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="Nexus" width="56" height="56" class="mb-2" style="border-radius: 12px;">
            <h2>Create your account</h2>
            <p class="text-muted">Start finding your next role today</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST" action="/register">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="name" class="form-label">Name <span class="text-muted small">(optional)</span></label>
                        <input type="text" class="form-control" id="name" name="name">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password"
                               required minlength="8">
                        <div class="form-text">Minimum 8 characters</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Create Account</button>
                </form>
            </div>
        </div>

        <p class="mt-3 text-center text-muted small">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
