{% extends "base.html" %}

{% block title %}Log In - Nexus{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="Nexus" width="56" height="56" class="mb-2" style="border-radius: 12px;">
            <h2>Welcome back</h2>
            <p class="text-muted">Log in to your Nexus account</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST" action="/login">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <a href="{{ url_for('forgot_password') }}" class="small">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Log In</button>
                </form>
            </div>
        </div>

        <p class="mt-3 text-center text-muted small">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
