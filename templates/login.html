{% extends "base.html" %}

{% block title %}Log In - Nexus{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="Nexus" width="56" height="56" class="mb-2" style="border-radius: 12px;">
            <h2>Welcome back</h2>
            <p class="text-muted">Log in to your Nexus account</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="POST" action="/login">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <a href="{{ url_for('forgot_password') }}" class="small">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Log In</button>
                </form>

                {% if config.GOOGLE_CLIENT_ID %}
                <div class="mt-3">
                    <div class="text-center text-muted small mb-2">or</div>
                    <a href="{{ url_for('google_login') }}" class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
                            <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9s0 0 0 0a9 9 0 00.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 2.58 9 3.58z" fill="#EA4335"/>
                        </svg>
                        Sign in with Google
                    </a>
                </div>
                {% endif %}
            </div>
        </div>

        <p class="mt-3 text-center text-muted small">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
